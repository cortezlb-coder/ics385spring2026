<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UH Maui College - Course Catalog</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="header-content">
      <h1>UH Maui College Course Catalog</h1>
      <p>Spring 2026 - Interactive Course Browser</p>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="search-section">
        <input
          type="text"
          id="searchInput"
          placeholder="Search courses, instructors, topics..."
        >
        <button id="clearSearchBtn" type="button">Clear</button>
      </div>

      <div class="filter-section">
        <select id="departmentFilter">
          <option value="all">All Departments</option>
          <option value="ICS">Information and Computer Sciences</option>
          <option value="MATH">Mathematics</option>
          <option value="BUS">Business</option>
        </select>

        <select id="creditsFilter">
          <option value="all">All Credit Hours</option>
          <option value="1">1 Credit</option>
          <option value="2">2 Credits</option>
          <option value="3">3 Credits</option>
          <option value="4">4 Credits</option>
          <option value="4+">4+ Credits</option>
        </select>
      </div>

      <div class="action-section">
        <button id="loadSampleBtn" type="button">Load Sample Data</button>
        <button id="addCourseBtn" type="button">Add New Course</button>
        <button id="exportBtn" type="button">Export JSON</button>
      </div>
    </section>

    <section id="statisticsSection" class="statistics">
      <div class="stat-item">
        <span class="stat-number" id="totalCourses">0</span>
        <span class="stat-label">Total Courses</span>
      </div>

      <div class="stat-item">
        <span class="stat-number" id="totalDepartments">0</span>
        <span class="stat-label">Departments</span>
      </div>

      <div class="stat-item">
        <span class="stat-number" id="averageEnrollment">0%</span>
        <span class="stat-label">Avg Enrollment</span>
      </div>
    </section>

    <section id="coursesContainer" class="courses-grid">
      <div class="loading">Loading course catalog...</div>
    </section>
  </main>

  <div id="courseModal" class="modal hidden">
    <div class="modal-content">
      <button class="close-btn" type="button" aria-label="Close modal">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <footer>
    <p>ICS 385 Week 8 - JSON Fundamentals Assignment</p>
  </footer>

  <script src="course-catalog.js"></script>
</body>
</html>
